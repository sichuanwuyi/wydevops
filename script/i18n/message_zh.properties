global.params.sh.usage.options=可选项
global.params.sh.usage.archTypes=要构建的Docker镜像的架构类型，默认值=undefine,\n                                    可选值有：\"linux/amd64,linux/arm64\",\"linux/amd64\",\"linux/arm64\",\"undefine\"
global.params.sh.usage.buildType=构建类型:\n                                    single：单镜像模式，构建应用镜像\n                                    double：双镜像模式，构建应用基础镜像和应用业务镜像\n                                    base：仅构建应用基础镜像\n                                    business：仅构建应用业务镜像\n                                    thirdParty: 打包第三方镜像：拉取第三方镜像，缓存到本地镜像缓存目录中，\n                                                然后推送到私库中，最后导出到gDockerBuildOutDir目录中。\n                                    customize: 自定义模式：指定docker构建目录，脚本框架自动完成docker镜像构建和推送。
global.params.sh.usage.chartRepo=Chart镜像仓库信息, 格式：{仓库类型(nexus或harbor)},{仓库实例名称(nexus)或项目名称(harbor)},\n                                    {仓库访问地址({IP}:{端口})},{登录账号},{登录密码},{Web管理端口(RestfulAPI接口使用的端口)}
global.params.sh.usage.dockerRepo=Docker镜像仓库信息, 格式：{仓库类型(nexus、harbor或registry)},{仓库实例名称(nexus)、项目名称(harbor)或组织代码(registry)},\n                                    {仓库访问地址({IP}:{端口})},{登录账号},{登录密码},{Web管理端口(RestfulAPI接口使用的端口)},{镜像名称是否带仓库实例名前缀(仅对nexus类型仓库有效)},\n                                    {服务名称(仅对registry类型仓库有效)},{配置文件全路径名称(仅对registry类型仓库有效)}
global.params.sh.usage.imageCacheDir=当workMode=local时，用于缓存Dockerfile文件中From行指定的Image镜像的本地目录。
global.params.sh.usage.language=项目语言类型或架构类型; 目前支持的有效值有：java、go、vue、nextjs、other等，依据具体实现而定。
global.params.sh.usage.localConfigFile=当workMode=local时，指定本地配置文件的名称, 默认值=\"ci-cd-config.yaml\"。
global.params.sh.usage.workMode=工作模式：jenkins、local
global.params.sh.usage.notify=外部通知接口的地址
global.params.sh.usage.outArchTypes=要导出的离线安装包的架构类型，默认值=\"linux/amd64,linux/arm64\"
global.params.sh.usage.buildPath=构建目录，一般为目标工程的根目录或主模块目录（例如：Java多模块项目）
global.params.sh.usage.buildStages=执行的构建阶段，有效值包括：build、docker、chart、package、deploy、all，\n                                    有效值为前五个阶段的有序组合,阶段间用英文逗号隔开；或直接设置为all；为空时等同于all。\n                                    例如：build,docker,chart——表示依次执行指定的构建阶段。
