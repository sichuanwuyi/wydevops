# global-params.sh
global.params.sh.usage.title=参数说明:
global.params.sh.usage.switches=开关量
global.params.sh.usage.clearCachedParams=清除本地全局参数缓存文件。
global.params.sh.usage.debug=启用DEBUG模式输出测试信息。
global.params.sh.usage.enableNotify=使能向外部接口发送CICD过程通知（需要配置-N参数）。
global.params.sh.usage.forceCoverage=部署阶段强制覆盖目标仓库中同名同版本的Docker镜像。
